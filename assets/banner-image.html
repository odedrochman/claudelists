<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1500px;
    height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1A1008;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    position: relative;
  }
  /* Decorative blobs */
  .blob-1 {
    position: absolute;
    top: -80px;
    right: -40px;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, #C15F3C 0%, transparent 70%);
    opacity: 0.18;
  }
  .blob-2 {
    position: absolute;
    bottom: -100px;
    left: -60px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, #D97757 0%, transparent 70%);
    opacity: 0.12;
  }
  .blob-3 {
    position: absolute;
    top: 60px;
    left: 200px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, #C15F3C 0%, transparent 70%);
    opacity: 0.08;
  }
  /* Top accent stripe */
  .stripe {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #C15F3C, #D97757, #E8926E);
  }
  /* Dots */
  .dot {
    position: absolute;
    border-radius: 50%;
    background: #C15F3C;
  }
  .dot-1 { top: 80px; right: 200px; width: 8px; height: 8px; opacity: 0.5; }
  .dot-2 { top: 160px; right: 320px; width: 6px; height: 6px; opacity: 0.35; background: #D97757; }
  .dot-3 { bottom: 120px; right: 150px; width: 10px; height: 10px; opacity: 0.25; }
  .dot-4 { top: 100px; left: 120px; width: 7px; height: 7px; opacity: 0.3; background: #E8926E; }
  .dot-5 { bottom: 80px; left: 300px; width: 9px; height: 9px; opacity: 0.2; }

  .content {
    display: flex;
    align-items: center;
    gap: 40px;
    z-index: 1;
  }
  .logo-box {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    background: #C15F3C;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FAF9F5;
    font-size: 36px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .text {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .brand {
    font-size: 56px;
    font-weight: 700;
    color: #FAF9F5;
    letter-spacing: -1px;
  }
  .brand span { color: #D97757; }
  .tagline {
    font-size: 22px;
    color: #B8A99A;
    font-weight: 400;
  }
  /* Category pills */
  .pills {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .pill {
    padding: 6px 16px;
    border-radius: 999px;
    border: 1.5px solid rgba(193, 95, 60, 0.3);
    font-size: 14px;
    color: #B8A99A;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="stripe"></div>
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="blob-3"></div>
  <div class="dot dot-1"></div>
  <div class="dot dot-2"></div>
  <div class="dot dot-3"></div>
  <div class="dot dot-4"></div>
  <div class="dot dot-5"></div>

  <div class="content">
    <div class="logo-box">CL</div>
    <div class="text">
      <div class="brand"><span>Claude</span>Lists</div>
      <div class="tagline">Community-curated Claude ecosystem resources</div>
      <div class="pills">
        <div class="pill">MCP Servers</div>
        <div class="pill">Prompts</div>
        <div class="pill">CLAUDE.md</div>
        <div class="pill">Workflows</div>
        <div class="pill">Tools</div>
      </div>
    </div>
  </div>
</body>
</html>
